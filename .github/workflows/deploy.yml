# Deploy the Vite build to GitHub Pages on every push to main.
# Source must also be set to "GitHub Actions" in the repo's Pages settings —
# done once via `gh api -X POST /repos/<owner>/<repo>/pages -f build_type=workflow`.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

# Avoid overlapping deploys cancelling each other
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Test gate — deploy refuses to ship if any check is broken.
      - run: npm test

      - run: npm run build
        env:
          NODE_ENV: production
          # Backend URL baked in at build time so the deployed bundle calls
          # the right host. Change here, push, and the next build picks it up.
          VITE_SANDBOX_URL: https://syntax-checker-backend-mhpo.onrender.com

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
